<html lang="en">
<head>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Spectral:ital,wght@0,300;0,400;0,500;1,400&family=Spectral+SC:wght@400;600&display=swap">

    <style>
        :root {
            --page: #f4ede0;
            --ink: #1a1410;
            --ink-secondary: #5a4d3f;
            --rule: #c9bfa7;
            --gold: #a8893a;
            --vermilion: #a73d28;

            --serif: "Spectral", Georgia, "Times New Roman", serif;
            --serif-sc: "Spectral SC", "Spectral", Georgia, serif;
            --display: "Cormorant Garamond", "Spectral", Georgia, serif;

            --t-smallcaps: 0.76rem;
            --t-meta: 0.85rem;

            --gutter: clamp(1rem, 3vw, 2.5rem);

            --net-node: rgba(168, 137, 58, 0.52);
            --net-node-hub: rgba(167, 61, 40, 0.72);
            --net-link: rgba(168, 137, 58, 0.26);
            --net-pulse: rgba(167, 61, 40, 0.95);
        }

        /* Dark mode reuses the original committed homepage's copper-on-near-black palette
           for the chrome/networks. Vermilion stays vermilion: the plate engraving keeps its
           imprint colour even in dark mode rather than inverting to copper. */
        .dark-mode {
            --page: #121212;
            --ink: #e8eaed;
            --ink-secondary: #9aa0ab;
            --rule: #2a2622;
            --gold: #d4a574;
            --vermilion: #b54732;
            --net-node: rgba(212, 165, 116, 0.55);
            --net-node-hub: rgba(232, 188, 140, 0.85);
            --net-link: rgba(180, 165, 145, 0.28);
            --net-pulse: rgba(255, 218, 170, 0.95);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            font-family: var(--serif);
            font-size: 17px;
            font-weight: 300;
            color: var(--ink);
            background: var(--page);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: geometricPrecision;
            font-feature-settings: "kern", "liga", "onum";
        }

        body {
            line-height: 1.7;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: var(--page);
            color: var(--ink);
            transition: background-color 400ms ease, color 400ms ease;
        }

        a {
            color: inherit;
            text-decoration: underline;
            text-decoration-color: var(--gold);
            text-decoration-style: solid;
            text-decoration-thickness: 1px;
            text-underline-offset: 0.2em;
            transition:
                color 0.25s ease,
                text-decoration-color 0.25s ease,
                text-decoration-thickness 0.25s ease,
                text-underline-offset 0.25s ease,
                text-shadow 0.25s ease,
                transform 0.08s ease-out;
        }
        a:hover {
            color: var(--vermilion);
            text-decoration-color: var(--vermilion);
            text-decoration-thickness: 2px;
            text-underline-offset: 0.26em;
            text-shadow: 0 0 0.5px currentColor;
        }
        a:active { transform: translateY(1px); }
        ::selection { background: var(--gold); color: var(--page); }

        /* ─── Header ─── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 1rem var(--gutter);
            background: var(--page);
            border-bottom: 1px solid var(--rule);
            font-family: var(--serif-sc);
            font-size: var(--t-smallcaps);
            letter-spacing: 0.12em;
            text-transform: lowercase;
            color: var(--ink-secondary);
            flex-shrink: 0;
            z-index: 50;
            gap: 1rem;
        }
        .page-header a { text-decoration: none; color: var(--ink-secondary); }
        .page-header a:hover {
            color: var(--vermilion);
            text-decoration: underline;
            text-decoration-color: var(--vermilion);
            text-decoration-thickness: 2px;
            text-underline-offset: 0.24em;
            text-shadow: 0 0 0.5px currentColor;
        }
        .page-header a:active { transform: translateY(1px); }
        .page-header .home {
            color: var(--ink);
            font-family: var(--display);
            font-size: 1.3rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: none;
        }
        .page-header nav { display: flex; gap: 1.5rem; align-items: baseline; flex-wrap: wrap; }
        .page-header nav .ext-group {
            display: flex; gap: 1.1rem;
            padding-left: 1.1rem;
            border-left: 1px solid var(--rule);
            opacity: 0.85;
        }
        .theme-toggle {
            background: none;
            border: 1px solid var(--rule);
            border-radius: 999px;
            padding: 0.28rem 0.75rem;
            cursor: pointer;
            font-family: var(--serif-sc);
            font-size: 0.68rem;
            letter-spacing: 0.12em;
            text-transform: lowercase;
            color: var(--ink-secondary);
            transition: all 0.2s ease;
            flex-shrink: 0;
            line-height: 1;
        }
        .theme-toggle:hover { color: var(--ink); border-color: var(--gold); }

        .hamburger-menu { display: none; background: none; border: none; cursor: pointer; padding: 6px; z-index: 51; }
        .hamburger-menu .line {
            display: block; width: 22px; height: 1.5px;
            background-color: var(--ink); margin: 5px 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* ─── Frontispiece grid (3x3, center = title plate, 8 around = mini networks) ─── */
        main { flex: 1; min-height: 0; display: flex; overflow: hidden; }

        .frontispiece-grid {
            display: grid;
            /* Center column slightly narrower so side networks step back from the wordmark;
               center row taller so the centre block has breathing room. */
            grid-template-columns: 1fr 0.85fr 1fr;
            grid-template-rows: 0.78fr 1.44fr 0.78fr;
            /* Asymmetric gap: tighter vertically, generous horizontally — keeps side networks off the centre */
            row-gap: clamp(0.4rem, 1vh, 0.8rem);
            column-gap: clamp(1.4rem, 3.2vw, 3rem);
            width: 100%;
            height: 100%;
            /* Minimal horizontal padding + no max-width: lets the grid use the full viewport so the
               side cells can sit as far left/right as possible. */
            padding: clamp(0.6rem, 1.5vh, 1.25rem) clamp(0.4rem, 1vw, 1rem);
            max-width: none;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
        }

        /* Bridge layer — thin lines drawn between the nearest nodes of adjacent network cells */
        .bridges-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        .bridges-layer .bridge {
            stroke: var(--gold);
            stroke-width: 0.7;
            stroke-opacity: 0;
            transition: stroke-opacity 800ms ease;
        }
        .bridges-layer.ready .bridge {
            stroke-opacity: 0.42;
        }

        .net-cell {
            position: relative;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
        }
        .net-cell canvas, .net-cell svg {
            width: 100%; height: 100%; display: block;
        }

        /* Mid-row side networks: hugged to the outer edges so the wordmark's horizontal
           range is clear of nodes, even though they sit on the same vertical band.
           Using `width` (not `max-width`) so the grid item keeps its size despite justify-self.
           The smaller this %, the more breathing room around the central writing. */
        .net-cell[data-net="3"] {
            width: 50%;
            justify-self: start;
        }
        .net-cell[data-net="4"] {
            width: 50%;
            justify-self: end;
        }

        /* Center cell — mirrors the twelve-vigils frontispiece structure:
           small vermilion mark · big uppercase wordmark · small-caps strands · nav · large plate engraving.
           overflow:visible so the wordmark can extend over the adjacent network cells (it's the page's anchor). */
        .frontispiece-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0.5rem clamp(0.5rem, 1.5vw, 1rem);
            min-width: 0;
            min-height: 0;
            overflow: visible;
            position: relative;
            z-index: 3;
        }

        .hero-imprint-mark {
            color: var(--vermilion);
            font-family: var(--display);
            font-style: normal;
            font-weight: 500;
            font-size: clamp(0.78rem, 0.95vw, 0.95rem);
            letter-spacing: 0.4em;
            text-transform: uppercase;
            margin: 0;
            transition: color 400ms ease;
        }

        .hero-wordmark {
            font-family: var(--display);
            font-style: normal;
            font-weight: 500;
            font-size: clamp(2rem, 5.4vw, 3.6rem);
            letter-spacing: 0.22em;
            text-transform: uppercase;
            line-height: 1.15;
            margin: clamp(1.25rem, 3vh, 2.25rem) 0 0;
            color: var(--ink);
            white-space: nowrap;
        }

        .hero-strands {
            font-family: var(--serif-sc);
            font-style: normal;
            font-size: clamp(0.72rem, 0.88vw, 0.9rem);
            letter-spacing: 0.12em;
            text-transform: lowercase;
            color: var(--ink-secondary);
            margin: clamp(0.6rem, 1.2vh, 1rem) 0 0;
        }

        .hero-social {
            font-family: var(--serif-sc);
            font-size: clamp(0.7rem, 0.82vw, 0.82rem);
            letter-spacing: 0.12em;
            text-transform: lowercase;
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem 1.4rem;
            justify-content: center;
            margin: clamp(1.1rem, 2.2vh, 1.8rem) 0 0;
        }
        .hero-social a {
            color: var(--ink-secondary);
            text-decoration: none;
            white-space: nowrap;
        }
        .hero-social a:hover {
            color: var(--vermilion);
            text-decoration: underline;
            text-decoration-color: var(--vermilion);
            text-decoration-thickness: 2px;
            text-underline-offset: 0.26em;
            text-shadow: 0 0 0.5px currentColor;
        }
        .hero-social a:active { transform: translateY(1px); }

        .hero-plate {
            display: block;
            width: clamp(110px, 11.5vw, 156px);
            height: clamp(164px, 17.1vw, 232px);
            color: var(--ink);   /* matches Twelve Vigils frontispiece: plate is in ink, not vermilion */
            margin: clamp(1.25rem, 2.6vh, 2rem) 0 0;
            transition: color 400ms ease, background-color 400ms ease;
            flex-shrink: 0;
        }
        .hero-plate svg { width: 100%; height: 100%; display: block; }

        /* Dark mode: inverted treatment — vermilion becomes the "paper", ink is the engraving.
           Crop a few pixels off each side of the SVG so its natural inner padding doesn't read
           as a vermilion "border" around the figure. */
        .dark-mode .hero-plate {
            background-color: #a73d28;
            color: #1a1410;
            overflow: hidden;
        }
        .dark-mode .hero-plate svg {
            transform: scale(1.1);
            transform-origin: center center;
        }

        /* ─── Footer ─── */
        .page-footer {
            border-top: 1px solid var(--rule);
            padding: 0.9rem var(--gutter);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-family: var(--serif-sc);
            font-size: var(--t-meta);
            color: var(--ink-secondary);
            letter-spacing: 0.06em;
            text-transform: lowercase;
            flex-shrink: 0;
            gap: 1rem;
        }
        .page-footer a { color: var(--ink-secondary); text-decoration: none; }
        .page-footer a:hover {
            color: var(--vermilion);
            text-decoration: underline;
            text-decoration-color: var(--vermilion);
            text-decoration-thickness: 2px;
            text-underline-offset: 0.24em;
            text-shadow: 0 0 0.5px currentColor;
        }
        .page-footer a:active { transform: translateY(1px); }
        .page-footer .mark {
            color: var(--vermilion);
            font-family: var(--display);
            font-weight: 500;
            letter-spacing: 0.3em;
            font-size: 0.95rem;
            text-transform: uppercase;
        }

        /* ─── Mobile: stack centred content + one mini-network below ─── */
        @media (max-width: 768px) {
            body { height: auto; overflow: auto; }
            body.nav-open { overflow: hidden; }
            main { overflow: visible; flex: 1 0 auto; }
            .page-header { padding: 0.9rem var(--gutter); }
            .page-header .home { font-size: 1.15rem; }

            .frontispiece-grid {
                display: flex;
                flex-direction: column;
                height: auto;
                padding: 2rem var(--gutter) 2rem;
                row-gap: 1.5rem;
                column-gap: 0;
                overflow: visible;
            }
            .net-cell { display: none; }
            .net-cell[data-net="6"] { display: block; height: 30vh; min-height: 200px; order: 2; width: 100%; justify-self: stretch; }
            .frontispiece-center { order: 1; padding: 1rem 0; overflow: visible; }

            /* Bridges layer not relevant when only one network shows */
            .bridges-layer { display: none; }

            .hero-imprint-mark { font-size: 0.78rem; }
            .hero-wordmark {
                font-size: clamp(1.55rem, 7vw, 2.3rem);
                letter-spacing: 0.16em;
                white-space: normal;          /* allow it to wrap on narrow viewports if needed */
                word-spacing: 0.05em;
            }
            .hero-strands { font-size: 0.85rem; letter-spacing: 0.12em; }
            .hero-social { font-size: 0.8rem; gap: 0.5rem 1.2rem; }
            .hero-plate { width: 122px; height: 182px; margin-top: 1.75rem; }

            .hamburger-menu { display: block; }
            .page-header nav {
                position: fixed; top: 0; left: 0;
                width: 100%; height: 100vh;
                background-color: var(--page);
                display: flex; flex-direction: column;
                justify-content: center; align-items: center;
                gap: 1.5rem;
                transform: translateX(100%);
                transition: transform 0.4s cubic-bezier(0.77, 0, 0.175, 1);
                font-size: 1.05rem;
                letter-spacing: 0.18em;
                z-index: 49;
            }
            .page-header nav .ext-group {
                flex-direction: column;
                border-left: 0;
                border-top: 1px solid var(--rule);
                padding-left: 0; padding-top: 1.5rem;
                margin-top: 0.5rem; gap: 1rem;
                align-items: center;
            }
            body.nav-open .page-header nav { transform: translateX(0); }
            body.nav-open .hamburger-menu .line-1 { transform: rotate(45deg) translate(5px, 5px); }
            body.nav-open .hamburger-menu .line-2 { opacity: 0; }
            body.nav-open .hamburger-menu .line-3 { transform: rotate(-45deg) translate(5px, -5px); }
        }
    </style>

    <script>
        const hamburger = document.querySelector('.hamburger-menu');
        hamburger.addEventListener('click', () => document.body.classList.toggle('nav-open'));
        document.querySelectorAll('.page-header nav a').forEach(link => {
            link.addEventListener('click', () => document.body.classList.remove('nav-open'));
        });

        // Theme — light default
        let currentTheme = localStorage.getItem('imprint-theme') || 'light';
        window.__themeListeners = [];
        function applyTheme(t) {
            document.documentElement.classList.toggle('dark-mode', t === 'dark');
            document.body.classList.toggle('dark-mode', t === 'dark');
            document.getElementById('theme-label').textContent = t === 'dark' ? 'light' : 'dark';
            localStorage.setItem('imprint-theme', t);
            currentTheme = t;
            window.__themeListeners.forEach(fn => { try { fn(t); } catch(e) {} });
        }
        function toggleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }
        applyTheme(currentTheme);

        // Inline the plate SVG so currentColor tints it via CSS
        (function loadPlate() {
            const el = document.getElementById('hero-plate');
            if (!el) return;
            fetch('images/illustrations/plate-10.svg')
                .then(r => r.ok ? r.text() : Promise.reject(r.status))
                .then(svg => {
                    el.innerHTML = svg;
                    const inner = el.querySelector('svg');
                    if (inner) { inner.removeAttribute('width'); inner.removeAttribute('height'); }
                })
                .catch(err => console.warn('plate-10 load failed', err));
        })();
    </script>

    <script type="module">
        // ─── 8 small WebGL constellations + bridges between their closest nodes ───
        const cells = Array.from(document.querySelectorAll('.net-cell'));
        const NETWORK_REGISTRY = [];

        function hasWebGL() {
            try {
                const c = document.createElement('canvas');
                return !!(window.WebGLRenderingContext && (c.getContext('webgl2') || c.getContext('webgl')));
            } catch (e) { return false; }
        }

        if (!hasWebGL()) {
            // Quiet fallback — leave the cells empty.
        } else {
            try {
                const THREE = await import('three');
                cells.forEach((cell, i) => {
                    const rect = cell.getBoundingClientRect();
                    if (rect.width < 30 || rect.height < 30) return;
                    const handle = createMiniNetwork(THREE, cell, i);
                    if (handle) NETWORK_REGISTRY[i] = handle;
                });
                setupBridges();
            } catch (err) {
                console.warn('three.js failed to load', err);
            }
        }

        // ─── Bridges: connect each cell to its grid neighbours via the closest node pair ───
        function setupBridges() {
            const svg = document.getElementById('bridges-layer');
            const grid = document.querySelector('.frontispiece-grid');
            if (!svg || !grid) return;

            const adjacency = [
                [0, 1], [1, 2],   // top row
                [0, 3], [2, 4],   // sides up
                [3, 5], [4, 7],   // sides down
                [5, 6], [6, 7]    // bottom row
            ];
            const svgns = 'http://www.w3.org/2000/svg';

            function nodePagePos(net, idx) {
                const rect = net.container.getBoundingClientRect();
                const n = net.nodes[idx];
                return {
                    x: rect.left + (n.x + net.getW() / 2),
                    y: rect.top + (net.getH() / 2 - n.y)
                };
            }

            function findClosestPair(netA, netB) {
                let minD2 = Infinity, bestA = 0, bestB = 0;
                for (let i = 0; i < netA.nodes.length; i++) {
                    for (let j = 0; j < netB.nodes.length; j++) {
                        const a = nodePagePos(netA, i);
                        const b = nodePagePos(netB, j);
                        const dx = a.x - b.x, dy = a.y - b.y;
                        const d2 = dx*dx + dy*dy;
                        if (d2 < minD2) { minD2 = d2; bestA = i; bestB = j; }
                    }
                }
                return { aIdx: bestA, bIdx: bestB };
            }

            const bridges = [];

            // Hold off until the entrance animation has placed nodes — then build & fade in.
            setTimeout(() => {
                adjacency.forEach(([a, b]) => {
                    const netA = NETWORK_REGISTRY[a];
                    const netB = NETWORK_REGISTRY[b];
                    if (!netA || !netB) return;
                    const pair = findClosestPair(netA, netB);
                    const line = document.createElementNS(svgns, 'line');
                    line.setAttribute('class', 'bridge');
                    svg.appendChild(line);
                    bridges.push({ netA, netB, aIdx: pair.aIdx, bIdx: pair.bIdx, line });
                });
                svg.classList.add('ready');

                let lastReeval = performance.now();
                function frame(now) {
                    const gridRect = grid.getBoundingClientRect();

                    // Periodically re-pick the closest pair — networks drift, so the bridge follows
                    if (now - lastReeval > 2200) {
                        lastReeval = now;
                        for (const b of bridges) {
                            const pair = findClosestPair(b.netA, b.netB);
                            b.aIdx = pair.aIdx; b.bIdx = pair.bIdx;
                        }
                    }

                    for (const b of bridges) {
                        const a = nodePagePos(b.netA, b.aIdx);
                        const c = nodePagePos(b.netB, b.bIdx);
                        b.line.setAttribute('x1', a.x - gridRect.left);
                        b.line.setAttribute('y1', a.y - gridRect.top);
                        b.line.setAttribute('x2', c.x - gridRect.left);
                        b.line.setAttribute('y2', c.y - gridRect.top);
                    }
                    requestAnimationFrame(frame);
                }
                requestAnimationFrame(frame);
            }, 3200);
        }

        function createMiniNetwork(THREE, container, seed) {
            const rect = container.getBoundingClientRect();
            let W = Math.max(50, Math.floor(rect.width));
            let H = Math.max(50, Math.floor(rect.height));

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'low-power' });
            renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
            renderer.setSize(W, H);
            renderer.setClearColor(0x000000, 0);
            container.appendChild(renderer.domElement);

            const scene = new THREE.Scene();
            const camera = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, -1000, 1000);

            function readColors() {
                const s = getComputedStyle(document.documentElement);
                const parse = (k, fb) => {
                    const v = s.getPropertyValue(k).trim();
                    const c = new THREE.Color();
                    try { c.setStyle(v); } catch(e) { c.setHex(fb); }
                    return c;
                };
                return {
                    node:  parse('--net-node',     0xa8893a),
                    hub:   parse('--net-node-hub', 0xa73d28),
                    link:  parse('--net-link',     0xa8893a),
                    pulse: parse('--net-pulse',    0xa73d28)
                };
            }
            let theme = readColors();

            // ─── Build a small graph (11–14 nodes, single cluster) — restrained so the centre carries the page ───
            const N = 11 + Math.floor(Math.random() * 4);
            const nodes = [];
            for (let i = 0; i < N; i++) {
                const isHub = i === 0;
                nodes.push({
                    id: i,
                    hub: isHub,
                    r: isHub ? 5 + Math.random() * 2 : 2.3 + Math.random() * 2.2,
                    baseSize: isHub ? 18 + Math.random() * 6 : 8 + Math.random() * 5,
                    x: (Math.random() - 0.5) * W * 0.6,
                    y: (Math.random() - 0.5) * H * 0.6,
                    flashStart: 0, flashDur: 0,
                    entranceDelay: 250 + seed * 90 + i * 40 + Math.random() * 200,
                    entranceDur: 800
                });
            }
            const edges = [];
            for (let i = 0; i < N; i++) {
                for (let j = i + 1; j < N; j++) {
                    if (Math.random() < 0.28) edges.push({ s: i, t: j, boostStart: 0, boostDur: 0 });
                }
            }
            // Orphan fix
            (function fix() {
                const deg = new Array(N).fill(0);
                edges.forEach(e => { deg[e.s]++; deg[e.t]++; });
                for (let i = 0; i < N; i++) {
                    if (deg[i] === 0) {
                        const target = (i === 0) ? 1 : 0;
                        edges.push({ s: i, t: target, boostStart: 0, boostDur: 0 });
                        deg[i]++; deg[target]++;
                    }
                }
            })();
            edges.forEach((e, i) => { e.entranceDelay = 400 + seed * 90 + i * 40 + Math.random() * 200; e.entranceDur = 700; });

            const simLinks = edges.map(e => ({ source: e.s, target: e.t }));
            const simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(simLinks).distance(Math.min(W, H) * 0.16).strength(0.18))
                .force('charge', d3.forceManyBody().strength(-Math.min(W, H) * 0.12))
                .force('center', d3.forceCenter(0, 0).strength(0.06))
                .force('collision', d3.forceCollide().radius(d => d.r + 3))
                .force('x', d3.forceX(0).strength(0.04))
                .force('y', d3.forceY(0).strength(0.04))
                .alpha(0.5)
                .alphaDecay(0.018)
                .stop();

            // ─── Node mesh ───
            const nodeGeom = new THREE.BufferGeometry();
            const nodePos = new Float32Array(N * 3);
            const nodeSize = new Float32Array(N);
            const nodeColor = new Float32Array(N * 3);
            const nodeFlash = new Float32Array(N);
            const nodeOpacity = new Float32Array(N);
            for (let i = 0; i < N; i++) {
                nodePos[i*3] = nodes[i].x; nodePos[i*3+1] = nodes[i].y;
                nodeSize[i] = nodes[i].baseSize;
                const col = nodes[i].hub ? theme.hub : theme.node;
                nodeColor[i*3] = col.r; nodeColor[i*3+1] = col.g; nodeColor[i*3+2] = col.b;
                nodeOpacity[i] = 0;
            }
            nodeGeom.setAttribute('position', new THREE.BufferAttribute(nodePos, 3));
            nodeGeom.setAttribute('aSize', new THREE.BufferAttribute(nodeSize, 1));
            nodeGeom.setAttribute('aColor', new THREE.BufferAttribute(nodeColor, 3));
            nodeGeom.setAttribute('aFlash', new THREE.BufferAttribute(nodeFlash, 1));
            nodeGeom.setAttribute('aOpacity', new THREE.BufferAttribute(nodeOpacity, 1));

            const nodeMat = new THREE.ShaderMaterial({
                uniforms: {
                    uPulse:   { value: theme.pulse.clone() },
                    uPxRatio: { value: renderer.getPixelRatio() }
                },
                vertexShader: `
                    attribute float aSize;
                    attribute vec3 aColor;
                    attribute float aFlash;
                    attribute float aOpacity;
                    varying vec3 vColor;
                    varying float vFlash;
                    varying float vOpacity;
                    uniform float uPxRatio;
                    void main() {
                        vColor = aColor; vFlash = aFlash; vOpacity = aOpacity;
                        gl_PointSize = aSize * (1.0 + aFlash * 0.55) * uPxRatio;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    varying float vFlash;
                    varying float vOpacity;
                    uniform vec3 uPulse;
                    void main() {
                        if (vOpacity < 0.01) discard;
                        vec2 p = gl_PointCoord - 0.5;
                        float d = length(p);
                        if (d > 0.5) discard;
                        float core = smoothstep(0.40, 0.0, d);
                        float halo = smoothstep(0.50, 0.20, d) * 0.55;
                        vec3 c = mix(vColor, uPulse, vFlash);
                        gl_FragColor = vec4(c, (core + halo) * vOpacity);
                    }
                `,
                transparent: true,
                depthWrite: false,
                blending: THREE.NormalBlending
            });
            const nodePoints = new THREE.Points(nodeGeom, nodeMat);
            scene.add(nodePoints);

            // ─── Edge mesh ───
            const edgeGeom = new THREE.BufferGeometry();
            const edgePos = new Float32Array(edges.length * 6);
            const edgeBoost = new Float32Array(edges.length * 2);
            const edgeOpacity = new Float32Array(edges.length * 2);
            for (let i = 0; i < edges.length; i++) {
                const a = nodes[edges[i].s], b = nodes[edges[i].t];
                edgePos[i*6] = a.x; edgePos[i*6+1] = a.y;
                edgePos[i*6+3] = b.x; edgePos[i*6+4] = b.y;
            }
            edgeGeom.setAttribute('position', new THREE.BufferAttribute(edgePos, 3));
            edgeGeom.setAttribute('aBoost', new THREE.BufferAttribute(edgeBoost, 1));
            edgeGeom.setAttribute('aOpacity', new THREE.BufferAttribute(edgeOpacity, 1));

            const edgeMat = new THREE.ShaderMaterial({
                uniforms: {
                    uColor: { value: theme.link.clone() },
                    uPulse: { value: theme.pulse.clone() }
                },
                vertexShader: `
                    attribute float aBoost;
                    attribute float aOpacity;
                    varying float vB;
                    varying float vO;
                    void main() {
                        vB = aBoost; vO = aOpacity;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 uColor;
                    uniform vec3 uPulse;
                    varying float vB;
                    varying float vO;
                    void main() {
                        vec3 c = mix(uColor, uPulse, vB);
                        gl_FragColor = vec4(c, (0.55 + vB * 0.4) * vO);
                    }
                `,
                transparent: true,
                depthWrite: false,
                blending: THREE.NormalBlending
            });
            const edgeLines = new THREE.LineSegments(edgeGeom, edgeMat);
            scene.add(edgeLines);

            // ─── Shine particle pool ───
            const PARTICLE_POOL = 2;
            const particleStates = [];
            const particleGeom = new THREE.BufferGeometry();
            const particlePos = new Float32Array(PARTICLE_POOL * 3);
            const particleAlpha = new Float32Array(PARTICLE_POOL);
            particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
            particleGeom.setAttribute('aAlpha', new THREE.BufferAttribute(particleAlpha, 1));

            const particleMat = new THREE.ShaderMaterial({
                uniforms: {
                    uColor:   { value: theme.pulse.clone() },
                    uPxRatio: { value: renderer.getPixelRatio() }
                },
                vertexShader: `
                    attribute float aAlpha;
                    varying float vA;
                    uniform float uPxRatio;
                    void main() {
                        vA = aAlpha;
                        gl_PointSize = 14.0 * aAlpha * uPxRatio + 5.0 * uPxRatio;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 uColor;
                    varying float vA;
                    void main() {
                        if (vA < 0.01) discard;
                        vec2 p = gl_PointCoord - 0.5;
                        float d = length(p);
                        if (d > 0.5) discard;
                        float core = smoothstep(0.45, 0.0, d);
                        float halo = smoothstep(0.5, 0.10, d) * 0.55;
                        gl_FragColor = vec4(uColor, (core + halo) * vA);
                    }
                `,
                transparent: true, depthWrite: false, blending: THREE.NormalBlending
            });
            const particlePoints = new THREE.Points(particleGeom, particleMat);
            scene.add(particlePoints);

            function spawnShine(edgeIdx) {
                if (particleStates.length >= PARTICLE_POOL) return;
                particleStates.push({ edgeIdx, startTime: performance.now(), duration: 900 });
            }

            // Theme update
            function pushTheme() {
                theme = readColors();
                nodeMat.uniforms.uPulse.value.copy(theme.pulse);
                edgeMat.uniforms.uColor.value.copy(theme.link);
                edgeMat.uniforms.uPulse.value.copy(theme.pulse);
                particleMat.uniforms.uColor.value.copy(theme.pulse);
                const a = nodeGeom.getAttribute('aColor');
                for (let i = 0; i < N; i++) {
                    const c = nodes[i].hub ? theme.hub : theme.node;
                    a.array[i*3] = c.r; a.array[i*3+1] = c.g; a.array[i*3+2] = c.b;
                }
                a.needsUpdate = true;
            }
            window.__themeListeners.push(pushTheme);

            // Resize
            const ro = new ResizeObserver(() => {
                const r = container.getBoundingClientRect();
                const w = Math.max(50, Math.floor(r.width));
                const h = Math.max(50, Math.floor(r.height));
                if (w === W && h === H) return;
                W = w; H = h;
                renderer.setSize(W, H);
                camera.left = -W/2; camera.right = W/2;
                camera.top = H/2; camera.bottom = -H/2;
                camera.updateProjectionMatrix();
            });
            ro.observe(container);

            // Pulses — each network on its own offset cadence so they don't all sync
            let paused = false;
            document.addEventListener('visibilitychange', () => { paused = document.hidden; });

            let pulseTimer = null;
            const pulsePeriod = 3000 + Math.random() * 1500;
            function pulseTick() {
                const now = performance.now();
                const ni = Math.floor(Math.random() * N);
                nodes[ni].flashStart = now;
                nodes[ni].flashDur = 2200;
                if (edges.length) {
                    const ei = Math.floor(Math.random() * edges.length);
                    edges[ei].boostStart = now;
                    edges[ei].boostDur = 1700;
                    spawnShine(ei);
                }
            }
            function startPulses() { if (!pulseTimer) pulseTimer = setInterval(pulseTick, pulsePeriod); }
            function stopPulses() { if (pulseTimer) { clearInterval(pulseTimer); pulseTimer = null; } }
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) stopPulses(); else startPulses();
            });
            setTimeout(() => { if (!document.hidden) startPulses(); }, 3500 + seed * 250);

            // Main loop
            const startT = performance.now();
            function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

            function tick(now) {
                if (paused) { requestAnimationFrame(tick); return; }
                const elapsed = now - startT;
                simulation.tick();
                nodes.forEach(n => {
                    const margin = (n.hub ? 10 : 6);
                    n.x = Math.max(-W/2 + margin, Math.min(W/2 - margin, n.x));
                    n.y = Math.max(-H/2 + margin, Math.min(H/2 - margin, n.y));
                });

                const np = nodeGeom.getAttribute('position');
                const nf = nodeGeom.getAttribute('aFlash');
                const no = nodeGeom.getAttribute('aOpacity');
                for (let i = 0; i < N; i++) {
                    const n = nodes[i];
                    np.array[i*3] = n.x; np.array[i*3+1] = n.y;
                    if (n.flashStart) {
                        const k = (now - n.flashStart) / n.flashDur;
                        if (k >= 1) { nf.array[i] = 0; n.flashStart = 0; }
                        else nf.array[i] = Math.sin(Math.PI * k);
                    }
                    if (no.array[i] < 1) {
                        const t = (elapsed - n.entranceDelay) / n.entranceDur;
                        no.array[i] = (t <= 0) ? 0 : (t >= 1) ? 1 : easeOutCubic(t);
                    }
                }
                np.needsUpdate = true; nf.needsUpdate = true; no.needsUpdate = true;

                const ep = edgeGeom.getAttribute('position');
                const eb = edgeGeom.getAttribute('aBoost');
                const eo = edgeGeom.getAttribute('aOpacity');
                for (let i = 0; i < edges.length; i++) {
                    const e = edges[i];
                    const a = nodes[e.s], b = nodes[e.t];
                    ep.array[i*6] = a.x; ep.array[i*6+1] = a.y;
                    ep.array[i*6+3] = b.x; ep.array[i*6+4] = b.y;
                    if (e.boostStart) {
                        const k = (now - e.boostStart) / e.boostDur;
                        const v = (k >= 1) ? 0 : Math.sin(Math.PI * k);
                        if (k >= 1) e.boostStart = 0;
                        eb.array[i*2] = v; eb.array[i*2+1] = v;
                    }
                    if (eo.array[i*2] < 1) {
                        const t = (elapsed - e.entranceDelay) / e.entranceDur;
                        const o = (t <= 0) ? 0 : (t >= 1) ? 1 : easeOutCubic(t);
                        eo.array[i*2] = o; eo.array[i*2+1] = o;
                    }
                }
                ep.needsUpdate = true; eb.needsUpdate = true; eo.needsUpdate = true;

                const pp = particleGeom.getAttribute('position');
                const pa = particleGeom.getAttribute('aAlpha');
                for (let i = 0; i < PARTICLE_POOL; i++) {
                    if (i < particleStates.length) {
                        const ps = particleStates[i];
                        const t = Math.max(0, Math.min(1, (now - ps.startTime) / ps.duration));
                        const e = edges[ps.edgeIdx];
                        const a = nodes[e.s], b = nodes[e.t];
                        pp.array[i*3] = a.x + (b.x - a.x) * t;
                        pp.array[i*3+1] = a.y + (b.y - a.y) * t;
                        pa.array[i] = Math.sin(Math.PI * t);
                    } else { pa.array[i] = 0; }
                }
                for (let i = particleStates.length - 1; i >= 0; i--) {
                    if ((now - particleStates[i].startTime) >= particleStates[i].duration) {
                        particleStates.splice(i, 1);
                    }
                }
                pp.needsUpdate = true; pa.needsUpdate = true;

                renderer.render(scene, camera);
                requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);

            // Expose this network so the bridges manager can read its current node positions
            return {
                container,
                nodes,
                seed,
                getW: () => W,
                getH: () => H
            };
        }
    </script>

</body>
